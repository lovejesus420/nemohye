<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <!-- 모바일 최적화 viewport: 노치/제스처바 safe-area 포함 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="네모혜 — 네 모든 혜택을 찾아드리는 서비스" />

    <!-- 테마 색상 (Android 상단 주소바 / 크롬 탭 색상) -->
    <meta name="theme-color" content="#0d1117" />

    <!-- PWA / 홈화면 추가 -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="네모혜" />

    <!-- 전화번호 자동 링크 방지 -->
    <meta name="format-detection" content="telephone=no" />

    <title>네모혜</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />

    <style>
      /* 전체 safe-area 적용 (노치·홈 제스처바 대응) */
      :root {
        --sat: env(safe-area-inset-top, 0px);
        --sab: env(safe-area-inset-bottom, 0px);
        --sal: env(safe-area-inset-left, 0px);
        --sar: env(safe-area-inset-right, 0px);
      }
      * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0;
        overscroll-behavior-y: none;   /* 당겨서 새로고침 방지 */
        -webkit-overflow-scrolling: touch;
      }
      /* 스크롤바 숨기기 (모바일) */
      ::-webkit-scrollbar { display: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
